<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Forja</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:     #0A0A0A;
      --surf:   #141414;
      --card:   #1C1C1C;
      --border: #272727;
      --acid:   #E8FF47;
      --text:   #F2F2F2;
      --muted:  #6A6A6A;
      --green:  #4ADE80;
      --r:      10px;
      --safe-t: env(safe-area-inset-top, 0px);
      --safe-b: env(safe-area-inset-bottom, 0px);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
    }

    /* ── SCREENS ── */
    .screen { display: none; flex-direction: column; min-height: 100dvh; }
    .screen.active { display: flex; }

    /* ══════════════════════════════
       HOME
    ══════════════════════════════ */
    #s-home {
      padding: calc(24px + var(--safe-t)) 20px calc(40px + var(--safe-b));
    }

    .home-top {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 32px;
    }
    .logo {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 13px; font-weight: 700;
      letter-spacing: 3px; text-transform: uppercase;
      color: var(--muted);
    }
    .icon-btn {
      width: 36px; height: 36px; border-radius: 8px;
      background: var(--surf); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 17px;
      -webkit-tap-highlight-color: transparent;
    }
    .icon-btn:active { background: var(--border); }

    .home-hero { margin-bottom: 24px; }
    .home-eyebrow {
      font-size: 11px; font-weight: 600;
      letter-spacing: 2.5px; text-transform: uppercase;
      color: var(--acid); margin-bottom: 8px;
    }
    .home-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(52px, 14vw, 72px);
      font-weight: 700; line-height: 0.92; letter-spacing: -2px;
    }
    .home-title em { color: var(--acid); font-style: normal; display: block; }

    .chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 24px; }
    .chip {
      font-size: 11px; font-weight: 500; color: var(--muted);
      background: var(--surf); border: 1px solid var(--border);
      border-radius: 6px; padding: 4px 9px; white-space: nowrap;
    }
    .chip strong { color: var(--text); }

    .day-grid { display: flex; flex-direction: column; gap: 8px; }

    .day-btn {
      display: flex; align-items: center; gap: 14px;
      background: var(--surf); border: 1px solid var(--border);
      border-radius: var(--r); padding: 14px 16px;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
      transition: background 0.15s;
    }
    .day-btn:active { background: var(--card); }
    .day-btn.done { border-color: var(--green); }

    .day-btn-num {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 22px; font-weight: 700;
      color: var(--border); line-height: 1; min-width: 32px;
    }
    .day-btn.done .day-btn-num { color: var(--green); }

    .day-btn-info { flex: 1; }
    .day-btn-name {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 15px; font-weight: 700; line-height: 1; margin-bottom: 3px;
    }
    .day-btn-sub { font-size: 11px; color: var(--muted); }
    .day-btn-arrow { font-size: 18px; color: var(--muted); }
    .day-btn.done .day-btn-arrow { color: var(--green); }

    /* ══════════════════════════════
       ROUTINE
    ══════════════════════════════ */
    #s-routine {
      padding-bottom: calc(80px + var(--safe-b));
    }

    .rtn-navbar {
      position: sticky; top: 0; z-index: 50;
      background: rgba(10,10,10,0.95);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: calc(14px + var(--safe-t)) 16px 14px;
      display: flex; align-items: center; gap: 12px;
    }
    .rtn-back {
      width: 36px; height: 36px; border-radius: 8px;
      background: var(--card); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 20px; color: var(--text);
      -webkit-tap-highlight-color: transparent; flex-shrink: 0;
    }
    .rtn-back:active { background: var(--border); }
    .rtn-nav-title {
      flex: 1;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 16px; font-weight: 700;
    }
    .rtn-done-badge {
      font-size: 11px; font-weight: 700;
      color: #000; background: var(--green);
      border-radius: 6px; padding: 3px 9px;
      display: none;
    }
    .rtn-done-badge.show { display: block; }

    .complete-banner {
      margin: 12px 16px 0;
      background: rgba(74,222,128,0.08);
      border: 1px solid rgba(74,222,128,0.25);
      border-radius: var(--r);
      padding: 12px 16px;
      display: none; align-items: center; gap: 10px;
    }
    .complete-banner.show { display: flex; }
    .cb-icon { font-size: 22px; }
    .cb-text { font-family: 'Space Grotesk', sans-serif; font-size: 14px; font-weight: 700; color: var(--green); }
    .cb-sub  { font-size: 11px; color: var(--muted); margin-top: 2px; }

    .ex-list {
      padding: 12px 16px;
      display: flex; flex-direction: column; gap: 8px;
    }

    .group-label {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 10px; font-weight: 700;
      letter-spacing: 2.5px; text-transform: uppercase;
      color: var(--acid); opacity: 0.6;
      padding: 8px 0 2px;
    }
    .group-label:first-child { padding-top: 2px; }

    .ex-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--r); overflow: hidden;
      transition: border-color 0.2s;
    }
    .ex-card.checked { border-color: var(--green); }

    .ex-main {
      padding: 14px 14px 0;
      display: flex; align-items: flex-start; gap: 10px;
    }
    .ex-info { flex: 1; }
    .ex-name {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 15px; font-weight: 700; line-height: 1.2;
    }
    .ex-badge {
      display: inline-block; margin-top: 5px;
      font-size: 10px; font-weight: 600;
      color: #000; background: var(--acid);
      padding: 2px 8px; border-radius: 20px;
    }
    .ex-tags {
      display: flex; flex-wrap: wrap; gap: 5px; margin-top: 6px;
    }
    .tag {
      font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 6px;
    }
    .t-sets { background: rgba(232,255,71,0.1);  color: #E8FF47; border: 1px solid rgba(232,255,71,0.2); }
    .t-reps { background: rgba(74,222,128,0.1);  color: #4ADE80; border: 1px solid rgba(74,222,128,0.2); }
    .t-rest { background: rgba(148,163,184,0.08);color: #94A3B8; border: 1px solid rgba(148,163,184,0.15); }

    /* checkbox */
    .ex-check {
      width: 28px; height: 28px; border-radius: 8px;
      border: 2px solid var(--border); background: var(--surf);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0; font-size: 15px;
      color: transparent; font-weight: 700;
      -webkit-tap-highlight-color: transparent;
      transition: border-color 0.15s, background 0.15s, color 0.15s;
    }
    .ex-check.done { border-color: var(--green); background: var(--green); color: #000; }

    /* weight row */
    .ex-weight-row {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 14px 12px; margin-top: 8px;
      border-top: 1px solid var(--border);
    }
    .ew-label {
      font-size: 10px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 1.5px;
      color: var(--muted); white-space: nowrap;
    }
    .ew-input {
      flex: 1;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 20px; font-weight: 700;
      color: var(--acid);
      background: transparent; border: none;
      border-bottom: 1px solid rgba(232,255,71,0.3);
      outline: none; padding: 2px 4px;
      min-width: 0;
      -webkit-tap-highlight-color: transparent;
    }
    .ew-unit {
      font-size: 13px; font-weight: 600; color: var(--muted);
      white-space: nowrap;
    }
    .ew-save {
      padding: 6px 14px; border-radius: 7px;
      background: var(--acid); color: #000; border: none;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 13px; font-weight: 700;
      cursor: pointer; flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.15s;
    }
    .ew-save:active { opacity: 0.8; }

    .ex-tip {
      font-size: 11px; color: var(--muted); line-height: 1.6;
      padding: 0 14px 12px;
      border-left: 2px solid var(--border);
      margin: 0 14px 12px;
    }

    /* bottom bar */
    .rtn-bottom {
      position: fixed; bottom: 0; left: 0; right: 0;
      padding: 10px 16px calc(10px + var(--safe-b));
      background: rgba(10,10,10,0.96);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-top: 1px solid var(--border);
      display: flex; gap: 8px;
    }
    .btn-sec {
      flex: 1; padding: 14px 10px; border-radius: var(--r);
      background: var(--card); color: var(--muted);
      border: 1px solid var(--border);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 14px; font-weight: 700;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
    }
    .btn-sec:active { background: var(--border); }
    .btn-pri {
      flex: 1; padding: 14px 10px; border-radius: var(--r);
      background: var(--acid); color: #000; border: none;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 14px; font-weight: 700;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
    }
    .btn-pri:active { opacity: 0.85; }

    /* ══════════════════════════════
       SETTINGS
    ══════════════════════════════ */
    #s-settings {
      padding: calc(20px + var(--safe-t)) 20px calc(40px + var(--safe-b));
    }
    .set-top {
      display: flex; align-items: center; gap: 12px; margin-bottom: 28px;
    }
    .set-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 22px; font-weight: 700;
    }

    .set-section {
      background: var(--surf); border: 1px solid var(--border);
      border-radius: var(--r); overflow: hidden; margin-bottom: 16px;
    }
    .set-section-hd {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 10px; font-weight: 700;
      letter-spacing: 2px; text-transform: uppercase;
      color: var(--muted); padding: 12px 16px 8px;
    }
    .set-row {
      display: flex; align-items: center; gap: 12px;
      padding: 11px 16px; border-top: 1px solid var(--border);
    }
    .set-row-label { flex: 1; font-size: 13px; font-weight: 500; }
    .set-row-sub   { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .set-input {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 15px; font-weight: 700; color: var(--text);
      background: var(--card); border: 1px solid var(--border);
      border-radius: 6px; padding: 6px 10px;
      width: 88px; text-align: right; outline: none;
    }
    .set-input:focus { border-color: var(--acid); }
    .set-unit { font-size: 12px; color: var(--muted); min-width: 22px; }

    .set-save-btn {
      width: 100%; padding: 14px; border-radius: var(--r);
      background: var(--acid); color: #000; border: none;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 15px; font-weight: 700;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
    }
    .set-save-btn:active { opacity: 0.85; }

    .log-table { width: 100%; border-collapse: collapse; }
    .log-table th {
      font-size: 10px; font-weight: 700; letter-spacing: 1px;
      text-transform: uppercase; color: var(--muted);
      padding: 8px 16px; text-align: left;
      border-bottom: 1px solid var(--border);
    }
    .log-table td { font-size: 12px; padding: 9px 16px; border-bottom: 1px solid var(--border); }
    .log-table tr:last-child td { border-bottom: none; }
    .log-wval { font-family: 'Space Grotesk', sans-serif; font-weight: 700; }
    .log-neg  { color: var(--green); }
    .log-pos  { color: #F87171; }
    .log-empty { padding: 14px 16px; font-size: 12px; color: var(--muted); }

    @media (min-width: 540px) {
      #s-home, #s-routine, #s-settings { max-width: 480px; margin: 0 auto; }
      .rtn-bottom { max-width: 480px; left: 50%; transform: translateX(-50%); border-radius: var(--r) var(--r) 0 0; }
    }
  </style>
</head>
<body>

<!-- ══════════════════════════════
     HOME
══════════════════════════════ -->
<div id="s-home" class="screen active">
  <div class="home-top">
    <span class="logo">Forja</span>
    <div class="icon-btn" id="btnOpenSettings">⚙️</div>
  </div>

  <div class="home-hero">
    <div class="home-eyebrow">Full Body · 5 días</div>
    <h1 class="home-title"><em>Forja</em></h1>
  </div>

  <div class="chips" id="profileChips"></div>
  <div class="day-grid" id="dayGrid"></div>
</div>

<!-- ══════════════════════════════
     ROUTINE
══════════════════════════════ -->
<div id="s-routine" class="screen">
  <div class="rtn-navbar">
    <div class="rtn-back" id="btnBack">&#8592;</div>
    <div class="rtn-nav-title" id="rtnTitle"></div>
    <div class="rtn-done-badge" id="rtnDoneBadge">✓ Listo</div>
  </div>

  <div class="complete-banner" id="completeBanner">
    <span class="cb-icon">🏆</span>
    <div>
      <div class="cb-text">Día completado</div>
      <div class="cb-sub">Todos los ejercicios marcados.</div>
    </div>
  </div>

  <div class="ex-list" id="exList"></div>

  <div class="rtn-bottom">
    <button class="btn-sec" id="btnPrev">&#8592; Anterior</button>
    <button class="btn-pri" id="btnNext">Siguiente &#8594;</button>
  </div>
</div>

<!-- ══════════════════════════════
     SETTINGS
══════════════════════════════ -->
<div id="s-settings" class="screen">
  <div class="set-top">
    <div class="icon-btn" id="btnCloseSettings">&#8592;</div>
    <span class="set-title">Ajustes</span>
  </div>

  <div class="set-section">
    <div class="set-section-hd">Medidas corporales</div>
    <div class="set-row">
      <div class="set-row-label">
        Peso
        <div class="set-row-sub">Se registra al guardar</div>
      </div>
      <input class="set-input" id="inWeight" type="text" inputmode="decimal">
      <span class="set-unit">kg</span>
    </div>
    <div class="set-row">
      <div class="set-row-label">% Grasa</div>
      <input class="set-input" id="inFat" type="text" inputmode="decimal">
      <span class="set-unit">%</span>
    </div>
    <div class="set-row">
      <div class="set-row-label">% Músculo</div>
      <input class="set-input" id="inMuscle" type="text" inputmode="decimal">
      <span class="set-unit">%</span>
    </div>
    <div class="set-row">
      <div class="set-row-label">Altura</div>
      <input class="set-input" id="inHeight" type="text" inputmode="numeric">
      <span class="set-unit">cm</span>
    </div>
  </div>
  <button class="set-save-btn" id="btnSaveProfile">Guardar medidas</button>

  <div class="set-section" style="margin-top:20px">
    <div class="set-section-hd">Historial semanal</div>
    <div id="logContent"></div>
  </div>
</div>

<script>
"use strict";

// ══════════════════════════════════════════════
// STORAGE
// ══════════════════════════════════════════════
function storageGet(key, def) {
  try {
    var v = localStorage.getItem(key);
    return v !== null ? JSON.parse(v) : def;
  } catch (e) {
    return def;
  }
}
function storageSet(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch (e) {}
}

// ══════════════════════════════════════════════
// DAYS
// Division: 2 muscle groups per day, 6 exercises
// Day 1: Pecho + Triceps
// Day 2: Espalda + Biceps
// Day 3: Cuadriceps + Hombros
// Day 4: Posterior (Isquios/Gluteo) + Core
// Day 5: Pecho + Espalda (fuerza pura, compuestos pesados)
// ══════════════════════════════════════════════
var DAYS = [
  {
    id: 1, name: "Día 1", color: "#E8FF47",
    focus: "Pecho + Tríceps",
    exercises: [
      { key: "d1_bench",    group: "Pecho",    name: "Press de Banca con Barra",           badge: "Pectoral mayor",         sets: 5, reps: "3–5",   rest: "3 min",   tip: "Movimiento principal de fuerza. Omóplatos retraídos, pies planos. Baja controlado 2–3 seg, empuje explosivo." },
      { key: "d1_inclineB", group: "Pecho",    name: "Press Inclinado con Barra",          badge: "Pecho superior",         sets: 4, reps: "6–8",   rest: "2–3 min", tip: "Banco a 30°. Codos a 75°. Baja hasta el pecho superior. Complementa la banca plana." },
      { key: "d1_pecDeck",  group: "Pecho",    name: "Aperturas en Pec Deck (Mariposa)",   badge: "Pectoral (aislamiento)", sets: 3, reps: "10–12", rest: "90 seg",  tip: "Contracción máxima al cerrar. Baja lento controlando el estiramiento. No sueltes la tensión." },
      { key: "d1_cgbench",  group: "Tríceps",  name: "Press de Banca Agarre Cerrado",      badge: "Tríceps · Pecho",        sets: 4, reps: "6–8",   rest: "2 min",   tip: "Agarre a la anchura de los hombros. Codos pegados al cuerpo. Gran ejercicio compuesto para tríceps." },
      { key: "d1_frenchEZ", group: "Tríceps",  name: "Press Francés con Barra EZ",         badge: "Cabeza larga tríceps",   sets: 3, reps: "8–10",  rest: "90 seg",  tip: "Codos apuntan al techo sin abrirlos. Baja la barra hasta la frente. Extiende completamente." },
      { key: "d1_triRope",  group: "Tríceps",  name: "Extensiones en Polea (Cuerda)",      badge: "Tríceps (3 cabezas)",    sets: 3, reps: "12–15", rest: "60 seg",  tip: "Codo fijo al cuerpo. Separa la cuerda al final para activar las 3 cabezas. Finalizador." }
    ]
  },
  {
    id: 2, name: "Día 2", color: "#47FFCB",
    focus: "Espalda + Bíceps",
    exercises: [
      { key: "d2_deadlift", group: "Espalda",  name: "Peso Muerto Convencional",           badge: "Espalda · Cadena post.", sets: 5, reps: "3–5",   rest: "4 min",   tip: "El rey de la fuerza de espalda. Barra sobre el empeine, espalda neutral, empuja el suelo. Usa cinturón a partir de pesos altos." },
      { key: "d2_rowBar",   group: "Espalda",  name: "Remo con Barra (Pendlay)",           badge: "Dorsal · Romboides",     sets: 4, reps: "6–8",   rest: "2–3 min", tip: "Torso casi paralelo al suelo. La barra parte del suelo cada rep. Tira al ombligo retrayendo escápulas." },
      { key: "d2_latpull",  group: "Espalda",  name: "Jalones al Pecho (Polea Alta)",      badge: "Dorsal ancho",           sets: 4, reps: "8–10",  rest: "2 min",   tip: "Lleva la barra al esternón. Codos hacia el suelo en la contracción. Baja controlado." },
      { key: "d2_curlEZ",   group: "Bíceps",   name: "Curl con Barra EZ",                 badge: "Bíceps braquial",        sets: 4, reps: "6–8",   rest: "90 seg",  tip: "Codos fijos al cuerpo. Sube hasta 90°+ y aprieta 1 seg arriba. Baja sin soltar la tensión." },
      { key: "d2_hammer",   group: "Bíceps",   name: "Curl Martillo con Mancuernas",       badge: "Bíceps · Braquial",      sets: 3, reps: "10–12", rest: "90 seg",  tip: "Agarre neutro. Activa el braquial además del bíceps. Alterna brazos. Peso por mano." },
      { key: "d2_curlCable",group: "Bíceps",   name: "Curl en Polea Baja",                badge: "Bíceps (tensión total)", sets: 3, reps: "12–15", rest: "60 seg",  tip: "La polea mantiene tensión en toda la trayectoria. Finalizador ideal para bombeo y volumen." }
    ]
  },
  {
    id: 3, name: "Día 3", color: "#C084FC",
    focus: "Cuádriceps + Hombros",
    exercises: [
      { key: "d3_squat",    group: "Cuádriceps",name: "Sentadilla con Barra Alta",         badge: "Cuád · Glúteo",          sets: 5, reps: "3–5",   rest: "3–4 min", tip: "El ejercicio de fuerza de piernas por excelencia. Baja hasta paralelo mínimo. Rodillas alineadas con los pies." },
      { key: "d3_legPress", group: "Cuádriceps",name: "Prensa de Piernas 45°",             badge: "Cuádriceps · Glúteo",    sets: 4, reps: "8–10",  rest: "2 min",   tip: "Pies a anchura de caderas. Baja lento 3 seg. No bloquees completamente las rodillas arriba." },
      { key: "d3_legExt",   group: "Cuádriceps",name: "Extensión de Cuádriceps (Máquina)", badge: "Cuádriceps (aislamiento)",sets: 3, reps: "12–15", rest: "90 seg",  tip: "Extensión completa, contrae el cuádriceps 1 seg arriba. Baja controlado sin soltar el peso." },

      { key: "d3_lateral",  group: "Hombros",   name: "Elevaciones Laterales con Mancuernas",badge: "Deltoides medial",     sets: 4, reps: "12–15", rest: "60 seg",  tip: "Codos ligeramente doblados. Sube hasta paralelo. Baja en 3 seg. Sin impulso de cintura. Peso por mano." }

  {
    id: 4, name: "Día 4", color: "#FF8C47",

    exercises: [

      { key: "d4_legCurl",  group: "Posterior", name: "Curl Femoral Tumbado (Máquina)",    badge: "Isquiotibiales",         sets: 4, reps: "8–10",  rest: "90 seg",  tip: "Caderas pegadas al banco. Curla hasta 90°+. Baja lento controlando la fase excéntrica." },
      { key: "d4_sumo",     group: "Posterior", name: "Sentadilla Sumo con Mancuerna",     badge: "Glúteo · Aductores",     sets: 4, reps: "10–12", rest: "90 seg",  tip: "Pies amplios, puntas afuera 45°. Baja profundo. Gran activación de glúteo y aductores. Sujeta la mancuerna colgando." },
      { key: "d4_plank",    group: "Core",      name: "Plancha Frontal Isométrica",        badge: "Core · Transverso",      sets: 4, reps: "40 seg",rest: "45 seg",  tip: "Cuerpo recto de cabeza a talones. Aprieta glúteos y abdomen. Sin caer la cadera." },
      { key: "d4_abWheel",  group: "Core",      name: "Rueda Abdominal",                   badge: "Core completo",          sets: 3, reps: "8–10",  rest: "60 seg",  tip: "Extiende sin arquear la zona lumbar. Si no aguantás la forma, hacelo desde las rodillas." },
      { key: "d4_pallof",   group: "Core",      name: "Pallof Press en Polea",             badge: "Core anti-rotación",     sets: 3, reps: "10 c/lado",rest: "60 seg",tip: "Parado lateral a la polea. Empuja y regresa sin rotar el tronco. Entrena estabilidad real del core." }
    ]

    exercises: [

      { key: "d5_inclineDB",group: "Pecho",    name: "Press Inclinado con Mancuernas",     badge: "Pecho superior",         sets: 4, reps: "8–10",  rest: "2 min",   tip: "Banco a 30–45°. Codos a 75°. Rango completo. Mayor estiramiento que con barra. Peso por mano." },
      { key: "d5_deadlift", group: "Espalda",  name: "Peso Muerto Convencional",           badge: "Espalda · Cadena post.", sets: 5, reps: "3–5",   rest: "4 min",   tip: "Día de fuerza máxima. Concentrá toda la energía. Barra sobre el empeine, espalda neutral, empuja el suelo." },
      { key: "d5_rowBar",   group: "Espalda",  name: "Remo con Barra (Pendlay)",           badge: "Dorsal · Romboides",     sets: 4, reps: "6–8",   rest: "2–3 min", tip: "Torso casi paralelo al suelo. La barra parte del suelo cada rep. Retrae escápulas en la contracción." },
      { key: "d5_latClose", group: "Espalda",  name: "Jalones Agarre Cerrado Neutro",      badge: "Dorsal · Bíceps",        sets: 3, reps: "10–12", rest: "90 seg",  tip: "Agarre neutro cerrado. Codos pegados al cuerpo al bajar. Activación diferente al agarre ancho." },
      { key: "d5_rearDelt", group: "Espalda",  name: "Vuelos Posteriores (Mancuernas)",    badge: "Deltoides posterior",    sets: 3, reps: "12–15", rest: "60 seg",  tip: "Torso inclinado 45°. Abre los brazos como alas. Equilibra el deltoides y protege el manguito. Peso por mano." }
    ]
  }
];
// Group icon map
var GROUP_ICONS = {
  "Piernas":    "🦵",
  "Cuádriceps": "🦵",
  "Posterior":  "🍑",
  "Espalda":    "🔙",
  "Pecho":      "🏋️",
  "Hombros":    "💛",
  "Bíceps":     "💪",
  "Tríceps":    "🦾",
  "Core":       "⬛"
};

// ══════════════════════════════════════════════
// STATE — loaded from localStorage on start
// ══════════════════════════════════════════════
var currentDayIdx = 0;
var profile = storageGet("forja_profile", { weight: 97.5, fat: 30.2, muscle: 35.5, height: 180, goal: 90 });
var bodyLog  = storageGet("forja_bodyLog",  [{ date: "Inicio", weight: 97.5, fat: 30.2, muscle: 35.5 }]);
var weights  = storageGet("forja_weights",  {});   // { exerciseKey: "160" }
var checked  = storageGet("forja_checked",  {});   // { exerciseKey: true }

// ══════════════════════════════════════════════
// SCREEN MANAGEMENT
// ══════════════════════════════════════════════
function showScreen(id) {
  var screens = document.querySelectorAll(".screen");
  for (var i = 0; i < screens.length; i++) {
    screens[i].classList.remove("active");
  }
  document.getElementById(id).classList.add("active");
  window.scrollTo(0, 0);
}

// ══════════════════════════════════════════════
// HOME
// ══════════════════════════════════════════════
function renderHome() {
  // Profile chips
  var chipsEl = document.getElementById("profileChips");
  chipsEl.innerHTML =
    "<span class='chip'>&#9878;&#65039; <strong>" + profile.weight + " kg</strong></span>" +
    "<span class='chip'>&#128207; <strong>" + profile.height + " cm</strong></span>" +
    "<span class='chip'>&#128293; Grasa <strong>" + profile.fat + "%</strong></span>" +
    "<span class='chip'>&#128170; Músculo <strong>" + profile.muscle + "%</strong></span>" +
    "<span class='chip'>&#127919; Meta <strong>" + profile.goal + " kg</strong></span>";

  // Day buttons
  var grid = document.getElementById("dayGrid");
  grid.innerHTML = "";
  for (var i = 0; i < DAYS.length; i++) {
    (function(dayIdx) {
      var day = DAYS[dayIdx];
      // Check if all exercises done
      var allDone = true;
      for (var j = 0; j < day.exercises.length; j++) {
        if (!checked[day.exercises[j].key]) { allDone = false; break; }
      }
      var btn = document.createElement("div");
      btn.className = "day-btn" + (allDone ? " done" : "");
      btn.innerHTML =
        "<div class='day-btn-num'>" + (dayIdx < 9 ? "0" : "") + (dayIdx + 1) + "</div>" +
        "<div class='day-btn-info'>" +
          "<div class='day-btn-name'>" + day.name + "</div>" +
          "<div class='day-btn-sub'>" + day.focus + "</div>" +
        "</div>" +
        "<div class='day-btn-arrow'>" + (allDone ? "✅" : "›") + "</div>";
      btn.addEventListener("click", function() { openDay(dayIdx); });
      grid.appendChild(btn);
    })(i);
  }
}

// ══════════════════════════════════════════════
// ROUTINE
// ══════════════════════════════════════════════
function openDay(dayIdx) {
  currentDayIdx = dayIdx;
  renderRoutine();
  showScreen("s-routine");
}

function renderRoutine() {
  var day = DAYS[currentDayIdx];
  document.documentElement.style.setProperty("--acid", day.color);
  document.getElementById("rtnTitle").textContent = day.name + " · " + day.id + "/5";

  // Check completion
  var totalEx = day.exercises.length;
  var doneCount = 0;
  for (var i = 0; i < totalEx; i++) {
    if (checked[day.exercises[i].key]) doneCount++;
  }
  var allDone = (doneCount === totalEx);
  document.getElementById("completeBanner").className = "complete-banner" + (allDone ? " show" : "");
  document.getElementById("rtnDoneBadge").className   = "rtn-done-badge" + (allDone ? " show" : "");

  // Nav buttons
  document.getElementById("btnPrev").style.visibility = currentDayIdx === 0 ? "hidden" : "visible";
  document.getElementById("btnNext").textContent = currentDayIdx === DAYS.length - 1 ? "✓ Fin" : "Siguiente →";

  // Build exercise cards
  var list = document.getElementById("exList");
  list.innerHTML = "";

  var lastGroup = null;
  for (var i = 0; i < day.exercises.length; i++) {
    var ex = day.exercises[i];

    // Group label
    if (ex.group !== lastGroup) {
      var gl = document.createElement("div");
      gl.className = "group-label";
      gl.textContent = (GROUP_ICONS[ex.group] || "") + " " + ex.group;
      list.appendChild(gl);
      lastGroup = ex.group;
    }

    // Card
    var card = document.createElement("div");
    card.className = "ex-card" + (checked[ex.key] ? " checked" : "");
    card.id = "card-" + ex.key;

    // -- ex-main (name + badge + tags + checkbox)
    var mainDiv = document.createElement("div");
    mainDiv.className = "ex-main";

    var infoDiv = document.createElement("div");
    infoDiv.className = "ex-info";

    var nameDiv = document.createElement("div");
    nameDiv.className = "ex-name";
    nameDiv.textContent = ex.name;

    var badgeDiv = document.createElement("div");
    badgeDiv.className = "ex-badge";
    badgeDiv.textContent = ex.badge;

    var tagsDiv = document.createElement("div");
    tagsDiv.className = "ex-tags";
    tagsDiv.innerHTML =
      "<span class='tag t-sets'>" + ex.sets + " series</span>" +
      "<span class='tag t-reps'>" + ex.reps + " reps</span>" +
      "<span class='tag t-rest'>" + ex.rest + " descanso</span>";

    infoDiv.appendChild(nameDiv);
    infoDiv.appendChild(badgeDiv);
    infoDiv.appendChild(tagsDiv);

    var cbDiv = document.createElement("div");
    cbDiv.className = "ex-check" + (checked[ex.key] ? " done" : "");
    cbDiv.textContent = checked[ex.key] ? "✓" : "";
    cbDiv.id = "cb-" + ex.key;
    (function(exKey) {
      cbDiv.addEventListener("click", function() { toggleCheck(exKey); });
    })(ex.key);

    mainDiv.appendChild(infoDiv);
    mainDiv.appendChild(cbDiv);
    card.appendChild(mainDiv);

    // -- weight row
    var weightRow = document.createElement("div");
    weightRow.className = "ex-weight-row";

    var ewLabel = document.createElement("div");
    ewLabel.className = "ew-label";
    ewLabel.textContent = "Peso:";

    var ewInput = document.createElement("input");
    ewInput.className = "ew-input";
    ewInput.id = "wi-" + ex.key;
    ewInput.type = "text";
    ewInput.inputMode = "decimal";
    ewInput.placeholder = "0";
    ewInput.value = weights[ex.key] !== undefined ? String(weights[ex.key]).replace(".", ",") : "";

    var ewUnit = document.createElement("span");
    ewUnit.className = "ew-unit";
    ewUnit.textContent = "kg";

    var ewSave = document.createElement("button");
    ewSave.className = "ew-save";
    ewSave.id = "save-" + ex.key;
    ewSave.textContent = "Guardar";
    (function(exKey) {
      ewSave.addEventListener("click", function() { saveWeight(exKey); });
    })(ex.key);

    weightRow.appendChild(ewLabel);
    weightRow.appendChild(ewInput);
    weightRow.appendChild(ewUnit);
    weightRow.appendChild(ewSave);
    card.appendChild(weightRow);

    // -- tip
    if (ex.tip) {
      var tipDiv = document.createElement("div");
      tipDiv.className = "ex-tip";
      tipDiv.textContent = ex.tip;
      card.appendChild(tipDiv);
    }

    list.appendChild(card);
  }
}

// ══════════════════════════════════════════════
// TOGGLE CHECK
// ══════════════════════════════════════════════
function toggleCheck(exKey) {
  checked[exKey] = !checked[exKey];
  storageSet("forja_checked", checked);

  // Update card class
  var card = document.getElementById("card-" + exKey);
  if (card) {
    if (checked[exKey]) { card.classList.add("checked"); }
    else { card.classList.remove("checked"); }
  }

  // Update checkbox
  var cb = document.getElementById("cb-" + exKey);
  if (cb) {
    cb.textContent = checked[exKey] ? "✓" : "";
    if (checked[exKey]) { cb.classList.add("done"); }
    else { cb.classList.remove("done"); }
  }

  // Check if day complete
  var day = DAYS[currentDayIdx];
  var allDone = true;
  for (var i = 0; i < day.exercises.length; i++) {
    if (!checked[day.exercises[i].key]) { allDone = false; break; }
  }
  document.getElementById("completeBanner").className = "complete-banner" + (allDone ? " show" : "");
  document.getElementById("rtnDoneBadge").className   = "rtn-done-badge" + (allDone ? " show" : "");
}

// ══════════════════════════════════════════════
// SAVE WEIGHT
// ══════════════════════════════════════════════
function saveWeight(exKey) {
  var inp = document.getElementById("wi-" + exKey);
  if (!inp) return;

  var raw = inp.value.replace(",", ".");
  var val = parseFloat(raw);

  if (isNaN(val) || val <= 0) {
    inp.style.borderBottomColor = "#F87171";
    setTimeout(function() { inp.style.borderBottomColor = ""; }, 1200);
    return;
  }

  // Save numeric value
  weights[exKey] = val;
  storageSet("forja_weights", weights);

  // Show value with comma back in input
  inp.value = String(val).replace(".", ",");

  // Flash save button
  var btn = document.getElementById("save-" + exKey);
  if (btn) {
    btn.textContent = "✅";
    setTimeout(function() { btn.textContent = "Guardar"; }, 1400);
  }
}

// ══════════════════════════════════════════════
// NAV
// ══════════════════════════════════════════════
function goHome() {
  document.documentElement.style.setProperty("--acid", "#E8FF47");
  renderHome();
  showScreen("s-home");
}

function navDay(delta) {
  var next = currentDayIdx + delta;
  if (next < 0) return;
  if (next >= DAYS.length) { goHome(); return; }
  currentDayIdx = next;
  renderRoutine();
  window.scrollTo(0, 0);
}

// ══════════════════════════════════════════════
// SETTINGS
// ══════════════════════════════════════════════
function openSettings() {
  document.getElementById("inWeight").value = String(profile.weight).replace(".", ",");
  document.getElementById("inFat").value    = String(profile.fat).replace(".", ",");
  document.getElementById("inMuscle").value = String(profile.muscle).replace(".", ",");
  document.getElementById("inHeight").value = String(profile.height).replace(".", ",");
  renderLog();
  showScreen("s-settings");
}

function closeSettings() {
  document.documentElement.style.setProperty("--acid", "#E8FF47");
  renderHome();
  showScreen("s-home");
}

function parseField(id) {
  return parseFloat(document.getElementById(id).value.replace(",", "."));
}

function saveProfile() {
  var w = parseField("inWeight");
  var f = parseField("inFat");
  var m = parseField("inMuscle");
  var h = parseField("inHeight");

  if (isNaN(w) || isNaN(f) || isNaN(m) || isNaN(h)) {
    alert("Revisá los valores ingresados."); return;
  }

  // Add to log
  var now = new Date();
  var months = ["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
  var dateStr = now.getDate() + " " + months[now.getMonth()];
  bodyLog.push({ date: dateStr, weight: w, fat: f, muscle: m });
  storageSet("forja_bodyLog", bodyLog);

  profile.weight = w; profile.fat = f; profile.muscle = m; profile.height = h;
  storageSet("forja_profile", profile);

  renderLog();
  var btn = document.getElementById("btnSaveProfile");
  btn.textContent = "✅ Guardado";
  setTimeout(function() { btn.textContent = "Guardar medidas"; }, 1500);
}

function renderLog() {
  var container = document.getElementById("logContent");
  if (bodyLog.length === 0) {
    container.innerHTML = "<div class='log-empty'>Sin registros aún.</div>";
    return;
  }
  var rows = "";
  var entries = bodyLog.slice().reverse().slice(0, 12);
  for (var i = 0; i < entries.length; i++) {
    var entry = entries[i];
    var prev  = i < entries.length - 1 ? entries[i + 1] : null;
    var deltaStr = "";
    if (prev) {
      var d = entry.weight - prev.weight;
      if (d !== 0) {
        var cls  = d > 0 ? "log-pos" : "log-neg";
        var sign = d > 0 ? "+" : "";
        deltaStr = " <span class='" + cls + "'>(" + sign + d.toFixed(1) + " kg)</span>";
      }
    }
    rows +=
      "<tr>" +
        "<td>" + entry.date + "</td>" +
        "<td><span class='log-wval'>" + entry.weight + "</span>" + deltaStr + " kg</td>" +
        "<td>" + entry.fat + "%</td>" +
        "<td>" + entry.muscle + "%</td>" +
      "</tr>";
  }
  container.innerHTML =
    "<table class='log-table'>" +
      "<thead><tr><th>Fecha</th><th>Peso</th><th>Grasa</th><th>Músculo</th></tr></thead>" +
      "<tbody>" + rows + "</tbody>" +
    "</table>";
}

// ══════════════════════════════════════════════
// EVENT LISTENERS — wired once, no inline onclick
// ══════════════════════════════════════════════
document.getElementById("btnOpenSettings").addEventListener("click",  openSettings);
document.getElementById("btnCloseSettings").addEventListener("click", closeSettings);
document.getElementById("btnBack").addEventListener("click",          goHome);
document.getElementById("btnPrev").addEventListener("click",          function() { navDay(-1); });
document.getElementById("btnNext").addEventListener("click",          function() { navDay(1); });
document.getElementById("btnSaveProfile").addEventListener("click",   saveProfile);

// ══════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════
renderHome();
</script>
</body>
</html>
