<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Forja</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:     #0A0A0A;
      --surf:   #141414;
      --card:   #1C1C1C;
      --border: #272727;
      --acid:   #E8FF47;
      --text:   #F2F2F2;
      --muted:  #6A6A6A;
      --r:      10px;
      --safe-t: env(safe-area-inset-top, 0px);
      --safe-b: env(safe-area-inset-bottom, 0px);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
    }

    /* ══════════════════════════
       SCREEN: HOME
    ══════════════════════════ */
    #screen-home {
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
      padding: calc(24px + var(--safe-t)) 20px calc(24px + var(--safe-b));
    }

    .home-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 36px;
    }
    .logo {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 13px; font-weight: 700;
      letter-spacing: 3px; text-transform: uppercase;
      color: var(--muted);
    }
    .week-pill {
      display: flex; align-items: center; gap: 6px;
      background: var(--surf); border: 1px solid var(--border);
      border-radius: 20px; padding: 4px 4px 4px 12px;
    }
    .week-pill span {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 12px; font-weight: 600; color: var(--text);
    }
    .wp-btn {
      width: 26px; height: 26px; border-radius: 50%;
      background: var(--card); border: 1px solid var(--border);
      color: var(--text); font-size: 14px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
    }
    .wp-btn:active { background: var(--border); }

    .home-hero { margin-bottom: 28px; }

    .home-eyebrow {
      font-size: 11px; font-weight: 600;
      letter-spacing: 2.5px; text-transform: uppercase;
      color: var(--acid); margin-bottom: 8px;
    }
    .home-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(52px, 14vw, 72px);
      font-weight: 700; line-height: 0.92;
      letter-spacing: -2px;
    }
    .home-title em {
      color: var(--acid); font-style: normal;
      display: block;
    }

    .chips {
      display: flex; flex-wrap: wrap; gap: 6px;
      margin-bottom: 24px;
    }
    .chip {
      font-size: 11px; font-weight: 500;
      color: var(--muted); background: var(--surf);
      border: 1px solid var(--border); border-radius: 6px;
      padding: 4px 9px; white-space: nowrap;
    }
    .chip strong { color: var(--text); }

    .prog-row {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 24px;
    }
    .prog-label { font-size: 11px; color: var(--muted); white-space: nowrap; }
    .prog-track { flex: 1; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
    .prog-fill  { height: 100%; background: var(--acid); border-radius: 2px; transition: width 0.4s ease; }
    .prog-pct   { font-size: 11px; font-weight: 600; color: var(--acid); min-width: 28px; text-align: right; }

    .day-grid { display: flex; flex-direction: column; gap: 8px; }

    .day-btn {
      display: flex; align-items: center;
      background: var(--surf); border: 1px solid var(--border);
      border-radius: var(--r); padding: 14px 16px;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
      transition: border-color 0.15s, background 0.15s;
      gap: 14px;
    }
    .day-btn:active { background: var(--card); }
    .day-btn.active {
      border-color: var(--acid);
      background: rgba(232,255,71,0.05);
    }
    .day-btn-num {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 22px; font-weight: 700;
      color: var(--border); line-height: 1; min-width: 32px;
    }
    .day-btn.active .day-btn-num { color: var(--acid); }
    .day-btn-info { flex: 1; }
    .day-btn-name {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 15px; font-weight: 700; line-height: 1; margin-bottom: 3px;
    }
    .day-btn-groups { font-size: 11px; color: var(--muted); }
    .day-btn-arrow  { font-size: 18px; color: var(--muted); }
    .day-btn.active .day-btn-arrow { color: var(--acid); }

    /* ══════════════════════════
       SCREEN: ROUTINE
    ══════════════════════════ */
    #screen-routine {
      display: none;
      flex-direction: column;
      min-height: 100dvh;
      padding-bottom: calc(80px + var(--safe-b));
    }

    .rtn-navbar {
      position: sticky; top: 0; z-index: 50;
      background: rgba(10,10,10,0.95);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: calc(14px + var(--safe-t)) 16px 14px;
      display: flex; align-items: center; gap: 12px;
    }
    .rtn-back {
      width: 36px; height: 36px; border-radius: 8px;
      background: var(--card); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 18px; color: var(--text);
      -webkit-tap-highlight-color: transparent; flex-shrink: 0;
    }
    .rtn-back:active { background: var(--border); }
    .rtn-nav-title {
      flex: 1; font-family: 'Space Grotesk', sans-serif;
      font-size: 16px; font-weight: 700;
    }
    .rtn-week-badge {
      font-size: 11px; font-weight: 600;
      color: var(--acid); background: rgba(232,255,71,0.1);
      border: 1px solid rgba(232,255,71,0.2);
      border-radius: 6px; padding: 3px 8px;
    }

    .rtn-summary {
      margin: 12px 16px;
      background: var(--surf); border: 1px solid var(--border);
      border-radius: var(--r); display: flex; overflow: hidden;
    }
    .sum-col {
      flex: 1; text-align: center; padding: 12px 8px;
      border-right: 1px solid var(--border);
    }
    .sum-col:last-child { border-right: none; }
    .sum-val {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 20px; font-weight: 700;
      color: var(--acid); line-height: 1;
    }
    .sum-lbl {
      font-size: 9px; font-weight: 600; color: var(--muted);
      letter-spacing: 1px; text-transform: uppercase; margin-top: 3px;
    }

    .ex-list {
      padding: 0 16px 12px;
      display: flex; flex-direction: column; gap: 8px;
    }
    .group-label {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 10px; font-weight: 700;
      letter-spacing: 2.5px; text-transform: uppercase;
      color: var(--acid); opacity: 0.65;
      padding: 10px 0 2px;
    }
    .group-label:first-child { padding-top: 4px; }

    .ex-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--r); padding: 14px 14px 12px;
      animation: fadeUp 0.25s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .ex-top {
      display: flex; align-items: flex-start;
      justify-content: space-between; gap: 8px; margin-bottom: 8px;
    }
    .ex-name {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 15px; font-weight: 700; line-height: 1.2; flex: 1;
    }
    .ex-badge {
      font-size: 10px; font-weight: 600;
      color: #000; background: var(--acid);
      padding: 2px 8px; border-radius: 20px;
      white-space: nowrap; flex-shrink: 0;
    }

    .ex-tags {
      display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 10px;
    }
    .tag {
      font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 6px;
    }
    .t-sets { background: rgba(232,255,71,0.1);  color: #E8FF47; border: 1px solid rgba(232,255,71,0.2); }
    .t-reps { background: rgba(74,222,128,0.1);  color: #4ADE80; border: 1px solid rgba(74,222,128,0.2); }
    .t-rest { background: rgba(148,163,184,0.08);color: #94A3B8; border: 1px solid rgba(148,163,184,0.15); }

    .weight-box {
      background: var(--surf); border: 1px solid var(--border);
      border-radius: 8px; overflow: hidden; display: flex;
    }
    .wbox-cell {
      flex: 1; padding: 9px 10px;
      border-right: 1px solid var(--border);
    }
    .wbox-cell:last-child { border-right: none; }
    .wbox-lbl {
      font-size: 9px; font-weight: 600;
      letter-spacing: 1.5px; text-transform: uppercase;
      color: var(--muted); margin-bottom: 3px;
    }
    .wbox-val {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 15px; font-weight: 700; line-height: 1;
    }
    .wbox-val.hi { color: var(--acid); }

    .ex-tip {
      margin-top: 8px; font-size: 11px; color: var(--muted);
      line-height: 1.6; padding-left: 9px; border-left: 2px solid var(--border);
    }

    .rtn-bottom {
      position: fixed; bottom: 0; left: 0; right: 0;
      padding: 10px 16px calc(10px + var(--safe-b));
      background: rgba(10,10,10,0.95);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border-top: 1px solid var(--border);
      display: flex; gap: 8px;
    }
    .btn-prev, .btn-next {
      flex: 1; padding: 14px 10px; border-radius: var(--r); border: none;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 14px; font-weight: 700;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
      transition: transform 0.1s, opacity 0.1s;
    }
    .btn-prev:active, .btn-next:active { transform: scale(0.97); opacity: 0.88; }
    .btn-prev { background: var(--card); color: var(--muted); border: 1px solid var(--border); }
    .btn-next { background: var(--acid); color: #000; }

    @media (min-width: 540px) {
      #screen-home    { max-width: 480px; margin: 0 auto; }
      #screen-routine { max-width: 480px; margin: 0 auto; }
      .rtn-bottom { max-width: 480px; left: 50%; transform: translateX(-50%); border-radius: var(--r) var(--r) 0 0; }
    }
  </style>
</head>
<body>

<!-- ══════════════════════════
     SCREEN: HOME
══════════════════════════ -->
<div id="screen-home">

  <div class="home-top">
    <span class="logo">Forja</span>
    <div class="week-pill">
      <span>Semana <strong id="weekNum">1</strong></span>
      <div class="wp-btn" onclick="changeWeek(-1)">&#8249;</div>
      <div class="wp-btn" onclick="changeWeek(1)">&#8250;</div>
    </div>
  </div>

  <div class="home-hero">
    <div class="home-eyebrow">Full Body · 5 días · Sin core</div>
    <h1 class="home-title"><em>Forja</em></h1>
  </div>

  <div class="chips">
    <span class="chip">⚖️ <strong>97.5 kg</strong></span>
    <span class="chip">📏 <strong>180 cm</strong></span>
    <span class="chip">🔥 Grasa <strong>30.2%</strong></span>
    <span class="chip">💪 Músculo <strong>35.5%</strong></span>
    <span class="chip">🎯 Meta <strong>90 kg</strong></span>
  </div>

  <div class="prog-row">
    <span class="prog-label">Programa</span>
    <div class="prog-track"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
    <span class="prog-pct" id="progPct">0%</span>
  </div>

  <div class="day-grid" id="dayGrid"></div>

</div>

<!-- ══════════════════════════
     SCREEN: ROUTINE
══════════════════════════ -->
<div id="screen-routine">

  <div class="rtn-navbar">
    <div class="rtn-back" onclick="goHome()">&#8592;</div>
    <div class="rtn-nav-title" id="rtnNavTitle">—</div>
    <div class="rtn-week-badge" id="rtnWeekBadge">Sem 1</div>
  </div>

  <div class="rtn-summary">
    <div class="sum-col"><div class="sum-val" id="sumEx">—</div><div class="sum-lbl">Ejercicios</div></div>
    <div class="sum-col"><div class="sum-val" id="sumSets">—</div><div class="sum-lbl">Series</div></div>
    <div class="sum-col"><div class="sum-val" id="sumMin">—</div><div class="sum-lbl">Min. est.</div></div>
    <div class="sum-col"><div class="sum-val" id="sumGrp">—</div><div class="sum-lbl">Grupos</div></div>
  </div>

  <div class="ex-list" id="exList"></div>

  <div class="rtn-bottom">
    <button class="btn-prev" id="btnPrev" onclick="navDay(-1)">&#8592; Anterior</button>
    <button class="btn-next" id="btnNext" onclick="navDay(1)">Siguiente &#8594;</button>
  </div>

</div>

<script>
// ══════════════════════════════════════════════
// PROFILE & SCALE
// leanMass = 97.5 × (1 - 0.302) = 68.1 kg
// Scale vs 70 kg reference = 68.1/70 = 0.973
// baseKg values are pre-scaled and snapped to nearest 2.5 kg
// ══════════════════════════════════════════════
const SCALE = (97.5 * (1 - 0.302)) / 70; // 0.973

function calcKg(ex, week) {
  if (ex.bodyweight) return null;
  const base = Math.round(ex.baseKg * SCALE / 2.5) * 2.5;
  return base + ex.stepKg * (week - 1);
}
function fmtKg(ex, week) {
  const w = calcKg(ex, week);
  if (w === null) return 'Peso corporal';
  return w + (ex.perHand ? ' kg/mano' : ' kg');
}
function fmtNext(ex, week) {
  if (ex.bodyweight) return '+ lastre sem. 4';
  if (ex.stepKg === 0) return 'Técnica';
  const n = calcKg(ex, week) + ex.stepKg;
  return n + (ex.perHand ? ' kg/mano' : ' kg');
}
function fmtProg(ex) {
  if (ex.bodyweight) return 'Corporal';
  if (ex.stepKg === 0) return '—';
  return '+' + ex.stepKg + ' kg/sem';
}

// ══════════════════════════════════════════════
// 5 FIXED DAYS — 6 or 7 exercises, 1 per group
// Groups: Piernas · Espalda · Pecho · Hombros · Bíceps · Tríceps
// Day 1 and 3 have 7 exercises (extra leg variation)
// ══════════════════════════════════════════════
const DAYS = [

  // ─── DÍA 1 ───────────────────────────────
  {
    id: 1, name: 'Día 1', color: '#E8FF47',
    focus: 'Sentadilla · Jalones · Banca · Press Militar · Curl · Polea',
    exercises: [
      {
        group: '🦵 Piernas',
        name: 'Sentadilla con Barra Alta',
        badge: 'Cuádriceps · Glúteo',
        sets: 4, reps: '5–6', rest: '3 min',
        baseKg: 80, stepKg: 2.5, perHand: false,
        tip: 'Baja hasta paralelo mínimo. Rodillas alineadas con los pies. Si la técnica falla, baja el peso antes que el rango.'
      },
      {
        group: '🔙 Espalda',
        name: 'Jalones al Pecho (Polea Alta)',
        badge: 'Dorsal ancho',
        sets: 4, reps: '8–10', rest: '2 min',
        baseKg: 55, stepKg: 1.25, perHand: false,
        tip: 'Lleva la barra al esternón. Codos hacia el suelo en la contracción. Baja controlado, no te dejes subir por la polea.'
      },
      {
        group: '🏋️ Pecho',
        name: 'Press de Banca con Barra',
        badge: 'Pectoral mayor',
        sets: 4, reps: '5–6', rest: '3 min',
        baseKg: 70, stepKg: 2.5, perHand: false,
        tip: 'Omóplatos retraídos y pies planos. Baja en 2–3 seg. Empuje explosivo hacia arriba.'
      },
      {
        group: '💛 Hombros',
        name: 'Press Militar con Barra (de pie)',
        badge: 'Deltoides anterior',
        sets: 4, reps: '6–8', rest: '2 min',
        baseKg: 45, stepKg: 1.25, perHand: false,
        tip: 'Core apretado, sin arquear la espalda. Empuje vertical estricto. Codos ligeramente adelantados.'
      },
      {
        group: '💪 Bíceps',
        name: 'Curl con Barra EZ',
        badge: 'Bíceps braquial',
        sets: 3, reps: '10–12', rest: '90 seg',
        baseKg: 25, stepKg: 1.25, perHand: false,
        tip: 'Codos fijos al cuerpo. Sube hasta 90°+ y aprieta arriba. Baja sin soltar la tensión.'
      },
      {
        group: '🦾 Tríceps',
        name: 'Extensiones en Polea Alta (Cuerda)',
        badge: 'Tríceps (3 cabezas)',
        sets: 3, reps: '12–15', rest: '90 seg',
        baseKg: 20, stepKg: 1.25, perHand: false,
        tip: 'Codo fijo al cuerpo. Separa la cuerda al final para activar las 3 cabezas. Extiende completamente.'
      }
    ]
  },

  // ─── DÍA 2 ───────────────────────────────
  {
    id: 2, name: 'Día 2', color: '#47FFCB',
    focus: 'Peso Muerto Rum. · Remo Barra · Press Inclinado · Arnold · Martillo · Press Francés',
    exercises: [
      {
        group: '🦵 Piernas',
        name: 'Peso Muerto Rumano (Barra)',
        badge: 'Isquios · Glúteo · Lumbar',
        sets: 4, reps: '5–6', rest: '3–4 min',
        baseKg: 100, stepKg: 2.5, perHand: false,
        tip: 'Espalda neutral siempre. Caderas atrás, barra roza las piernas. Pausa 1 seg abajo. Usa cinturón a partir de semana 5.'
      },
      {
        group: '🔙 Espalda',
        name: 'Remo con Barra (Pendlay)',
        badge: 'Dorsal · Romboides · Trapecio',
        sets: 4, reps: '6–8', rest: '2–3 min',
        baseKg: 65, stepKg: 2.5, perHand: false,
        tip: 'Torso a 45°, espalda recta. Tira al ombligo retrayendo escápulas. La barra parte del suelo en cada rep.'
      },
      {
        group: '🏋️ Pecho',
        name: 'Press Inclinado con Mancuernas',
        badge: 'Pecho superior',
        sets: 4, reps: '8–10', rest: '2 min',
        baseKg: 26, stepKg: 1.25, perHand: true,
        tip: 'Banco a 30–45°. Codos a 75°, no los abras demasiado. Rango completo de movimiento. Peso por mano.'
      },
      {
        group: '💛 Hombros',
        name: 'Press Arnold con Mancuernas',
        badge: 'Deltoides 3 cabezas',
        sets: 3, reps: '10–12', rest: '90 seg',
        baseKg: 18, stepKg: 1.25, perHand: true,
        tip: 'Empieza con palmas hacia ti, gira al subir hasta pronación. Cubre todo el arco del deltoides. Peso por mano.'
      },
      {
        group: '💪 Bíceps',
        name: 'Curl Martillo con Mancuernas',
        badge: 'Bíceps · Braquial',
        sets: 3, reps: '10–12', rest: '90 seg',
        baseKg: 16, stepKg: 1.25, perHand: true,
        tip: 'Agarre neutro (palma hacia adentro). Activa el braquial además del bíceps. Peso por mano.'
      },
      {
        group: '🦾 Tríceps',
        name: 'Press Francés con Barra EZ',
        badge: 'Cabeza larga tríceps',
        sets: 3, reps: '8–10', rest: '90 seg',
        baseKg: 22, stepKg: 1.25, perHand: false,
        tip: 'Codos apuntan al techo sin abrirlos. Baja la barra a la frente. Extiende completamente.'
      }
    ]
  },

  // ─── DÍA 3 ───────────────────────────────
  {
    id: 3, name: 'Día 3', color: '#C084FC',
    focus: 'Hip Thrust · Remo Cable · Banca Mancuernas · Elevaciones Lat. · Curl Polea · Fondos',
    exercises: [
      {
        group: '🦵 Piernas',
        name: 'Hip Thrust con Barra',
        badge: 'Glúteo mayor',
        sets: 4, reps: '8–10', rest: '2 min',
        baseKg: 80, stepKg: 2.5, perHand: false,
        tip: 'Espalda apoyada en banco. Cadera al nivel del torso en el punto más alto. Aprieta el glúteo 1 seg arriba.'
      },
      {
        group: '🔙 Espalda',
        name: 'Remo en Polea Baja (Cable)',
        badge: 'Dorsal · Trapecio medio',
        sets: 4, reps: '10–12', rest: '2 min',
        baseKg: 55, stepKg: 1.25, perHand: false,
        tip: 'Espalda recta, tira hacia el ombligo. Retrae las escápulas en contracción. Controla la vuelta sin inclinarte.'
      },
      {
        group: '🏋️ Pecho',
        name: 'Press de Banca con Mancuernas',
        badge: 'Pectoral mayor',
        sets: 4, reps: '8–10', rest: '2 min',
        baseKg: 28, stepKg: 1.25, perHand: true,
        tip: 'Mayor rango que con barra. Baja hasta que los codos queden bajo el banco. Peso por mano.'
      },
      {
        group: '💛 Hombros',
        name: 'Elevaciones Laterales con Mancuernas',
        badge: 'Deltoides medial',
        sets: 4, reps: '12–15', rest: '90 seg',
        baseKg: 10, stepKg: 0.5, perHand: true,
        tip: 'Codos ligeramente doblados. Sube hasta paralelo. Baja en 3 seg. Sin impulso de cintura. Peso por mano.'
      },
      {
        group: '💪 Bíceps',
        name: 'Curl en Polea Baja',
        badge: 'Bíceps (tensión constante)',
        sets: 3, reps: '12–15', rest: '90 seg',
        baseKg: 20, stepKg: 1.25, perHand: false,
        tip: 'La polea mantiene tensión en toda la trayectoria a diferencia del curl libre. Ideal para volumen.'
      },

// ══════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════
let currentWeek = parseInt(localStorage.getItem('forja_week') || '1');
let currentDay  = 0;
const MAX_WEEKS = 12;

// ══════════════════════════════════════════════
// RENDER HOME
// ══════════════════════════════════════════════
function renderHome() {
  document.getElementById('weekNum').textContent = currentWeek;
  const pct = Math.round(((currentWeek - 1) / (MAX_WEEKS - 1)) * 100);
  document.getElementById('progFill').style.width = pct + '%';
  document.getElementById('progPct').textContent = pct + '%';

  const grid = document.getElementById('dayGrid');
  grid.innerHTML = '';
  DAYS.forEach((day, idx) => {
    const btn = document.createElement('div');
    btn.className = 'day-btn' + (idx === currentDay ? ' active' : '');
    btn.innerHTML = `
      <div class="day-btn-num">${String(day.id).padStart(2,'0')}</div>
      <div class="day-btn-info">
        <div class="day-btn-name">${day.name}</div>
        <div class="day-btn-groups">${day.focus}</div>
      </div>
      <div class="day-btn-arrow">›</div>
    `;
    btn.addEventListener('click', () => openDay(idx));
    grid.appendChild(btn);
  });
}

// ══════════════════════════════════════════════
// RENDER ROUTINE
// ══════════════════════════════════════════════
function renderRoutine(dayIdx, week) {
  const day = DAYS[dayIdx];
  document.documentElement.style.setProperty('--acid', day.color);

  document.getElementById('rtnNavTitle').textContent = day.name + ' · ' + day.id + '/5';
  document.getElementById('rtnWeekBadge').textContent = 'Sem. ' + week;

  const exArr = day.exercises;
  const totalSets = exArr.reduce((s, e) => s + e.sets, 0);
  const estMin = Math.round(totalSets * 2.5 + exArr.length * 1.5);
  const groups = new Set(exArr.map(e => e.group)).size;

  document.getElementById('sumEx').textContent   = exArr.length;
  document.getElementById('sumSets').textContent = totalSets;
  document.getElementById('sumMin').textContent  = '~' + estMin;
  document.getElementById('sumGrp').textContent  = groups;

  const list = document.getElementById('exList');
  list.innerHTML = '';

  let lastGroup = null;
  exArr.forEach((ex, idx) => {
    if (ex.group !== lastGroup) {
      const gl = document.createElement('div');
      gl.className = 'group-label';
      gl.textContent = ex.group;
      list.appendChild(gl);
      lastGroup = ex.group;
    }

    const card = document.createElement('div');
    card.className = 'ex-card';
    card.style.animationDelay = (idx * 0.04) + 's';
    card.innerHTML = `
      <div class="ex-top">
        <div class="ex-name">${ex.name}</div>
        <div class="ex-badge">${ex.badge}</div>
      </div>
      <div class="ex-tags">
        <span class="tag t-sets">${ex.sets} series</span>
        <span class="tag t-reps">${ex.reps} reps</span>
        <span class="tag t-rest">${ex.rest} descanso</span>
      </div>
      <div class="weight-box">
        <div class="wbox-cell">
          <div class="wbox-lbl">Peso hoy</div>
          <div class="wbox-val hi">${fmtKg(ex, week)}</div>
        </div>
        <div class="wbox-cell">
          <div class="wbox-lbl">Próx. semana</div>
          <div class="wbox-val">${fmtNext(ex, week)}</div>
        </div>
        <div class="wbox-cell">
          <div class="wbox-lbl">Progresión</div>
          <div class="wbox-val">${fmtProg(ex)}</div>
        </div>
      </div>
      ${ex.tip ? `<div class="ex-tip">${ex.tip}</div>` : ''}
    `;
    list.appendChild(card);
  });

  document.getElementById('btnPrev').style.visibility =
    dayIdx === 0 ? 'hidden' : 'visible';
  document.getElementById('btnNext').textContent =
    dayIdx === DAYS.length - 1 ? '✓ Listo' : 'Siguiente ›';
}

// ══════════════════════════════════════════════
// NAVIGATION
// ══════════════════════════════════════════════
function openDay(idx) {
  currentDay = idx;
  renderRoutine(idx, currentWeek);
  document.getElementById('screen-home').style.display    = 'none';
  document.getElementById('screen-routine').style.display = 'flex';
  window.scrollTo(0, 0);
}

function goHome() {
  document.documentElement.style.setProperty('--acid', '#E8FF47');
  document.getElementById('screen-home').style.display    = 'flex';
  document.getElementById('screen-routine').style.display = 'none';
  renderHome();
}

function navDay(delta) {
  const next = currentDay + delta;
  if (next < 0) return;
  if (next >= DAYS.length) { goHome(); return; }
  currentDay = next;
  renderRoutine(currentDay, currentWeek);
  window.scrollTo(0, 0);
}

function changeWeek(delta) {
  currentWeek = Math.max(1, Math.min(MAX_WEEKS, currentWeek + delta));
  localStorage.setItem('forja_week', currentWeek);
  renderHome();
}

// ══════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════
renderHome();
</script>
